<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <filter id="noise" x="-20%" y="-50%" width="140%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.92
        0 0 0 0 0.92
        0 0 0 0 0.92
        0 0 0 0.5 0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.25" />
      </feComponentTransfer>
    </filter>

    <filter id="veins" x="-10%" y="-30%" width="120%" height="160%">
      <feTurbulence type="turbulence" baseFrequency="0.014" numOctaves="3" seed="9" />
      <feDisplacementMap in="SourceGraphic" scale="28" />
      <feGaussianBlur stdDeviation="0.6" />
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.55
        0 0 0 0 0.55
        0 0 0 0 0.55
        0 0 0 0.22 0" />
    </filter>

    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#F8F8F7" />
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#base)" />
  <g filter="url(#noise)">
    <rect width="1200" height="300" fill="#FFFFFF" />
  </g>
  <g filter="url(#veins)">
    <path d="M-40 60 C 180 120, 300 40, 520 100 C 720 150, 880 80, 1240 140" fill="none" stroke="#8C8C8C" stroke-width="4" stroke-linecap="round" opacity="0.28"/>
    <path d="M-60 190 C 210 140, 420 250, 650 190 C 860 130, 980 210, 1260 180" fill="none" stroke="#0D0D0D" stroke-width="3" stroke-linecap="round" opacity="0.10"/>
    <path d="M-20 120 C 220 170, 380 120, 610 160 C 840 200, 980 120, 1220 220" fill="none" stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  </g>
</svg>

